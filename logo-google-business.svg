<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2530"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#7b1d13"/>
    </linearGradient>
    <linearGradient id="flameG" x1="0%" y1="100%" x2="10%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    <linearGradient id="innerG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F39C12" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0 L0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="1200" fill="url(#grid)"/>

  <!-- Subtle red accent circle in background -->
  <circle cx="600" cy="480" r="380" fill="none" stroke="rgba(192,57,43,0.08)" stroke-width="80"/>

  <!-- ═══ SHIELD — centré ═══ -->
  <g transform="translate(600, 310)">
    <!-- Shield body -->
    <path d="M0 -230 L-200 -150 L-200 60 C-200 180 -100 260 0 300 C100 260 200 180 200 60 L200 -150 Z"
          fill="url(#shieldG)" filter="url(#shieldShadow)"/>

    <!-- Shield inner border -->
    <path d="M0 -210 L-180 -135 L-180 60 C-180 168 -88 244 0 282 C88 244 180 168 180 60 L180 -135 Z"
          fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

    <!-- Flame outer -->
    <path d="M0 248
             C-72 196 -114 120 -108 44
             C-104 -4 -80 -46 -48 -78
             C-54 -44 -36 -18 -12 -10
             C-20 -54 -12 -104 20 -148
             C22 -100 4 -56 22 -28
             C46 -66 50 -108 38 -150
             C94 -94 112 -18 102 48
             C90 140 52 210 0 248Z"
          fill="url(#flameG)"/>

    <!-- Flame inner golden core -->
    <path d="M0 210
             C-44 172 -64 120 -56 72
             C-50 42 -32 18 -10 2
             C-14 24 -6 42 6 48
             C-2 16 6 -18 28 -50
             C30 -14 16 20 30 40
             C50 12 52 -18 42 -48
             C80 0 90 52 82 98
             C72 152 40 196 0 210Z"
          fill="url(#innerG)"/>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "Securite Incendie" -->
  <text x="600" y="740"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        fill="#f1f5f9"
        text-anchor="middle"
        letter-spacing="-1"
        filter="url(#textShadow)">Securite Incendie</text>

  <!-- "Pro" -->
  <text x="600" y="848"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80"
        font-weight="800"
        fill="#C0392B"
        text-anchor="middle"
        letter-spacing="8">PRO</text>

  <!-- Separator -->
  <line x1="200" y1="880" x2="1000" y2="880" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="600" y="924"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#64748b"
        text-anchor="middle"
        letter-spacing="5">EXPERTS CERTIFIÉS  •  DEVIS GRATUIT</text>

  <!-- Certification badges row -->
  <g transform="translate(600, 980)">
    <!-- APSAD -->
    <rect x="-160" y="0" width="90" height="28" rx="5" fill="#C0392B" opacity="0.9"/>
    <text x="-115" y="19" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">APSAD</text>

    <!-- CNPP -->
    <rect x="-55" y="0" width="80" height="28" rx="5" fill="rgba(255,255,255,0.1)"/>
    <text x="-15" y="19" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">CNPP</text>

    <!-- NF -->
    <rect x="40" y="0" width="58" height="28" rx="5" fill="rgba(255,255,255,0.07)"/>
    <text x="69" y="19" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="2">NF</text>
  </g>

</svg>
